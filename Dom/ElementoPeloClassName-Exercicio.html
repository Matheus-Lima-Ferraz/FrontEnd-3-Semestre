<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .corsim {
            color: green;
        }
        .cornao {
            color: red;
        }
    </style>
</head>
<body>
    <input type="text" id="fruta" placeholder="digite o nome da fruta"/>
    <select name="" id="nomeClasse">
        <option value="">Selecione</option>
        <option value="corsim">CorSim</option>
        <option value="cornao">CorNao</option>
    </select>
    <button onclick="cadastrarFruta();" typer="button">Cadastrar</button>

    <ul id="listarFruta">
        <li class="corsim">Amora</li>
    </ul>

    <script>
        function cadastrarFruta() {
            const fruta = document.getElementById("fruta").value;
            const nomeClasse = document.getElementById("nomeClasse").value;
            const listarFruta = document.getElementById("listarFruta");

            // validar se há campos sem preencher
            if( fruta .trim().length == 0 || nomeClasse.trim().length == 0){
                    alert("Preencha todos os campos!");
                    return false;
            }

            // cadastrar a fruta
            const li = document.createElement("li");
            listarFruta.innerHTML += `<li class = "${nomeClasse}">${fruta}</li>`;
            // limpar o campo
            document.getElementById("fruta").value = "";
            document.getElementById("nomeClasse").value = "";

        }
    </script>
    
</body>
</html>
